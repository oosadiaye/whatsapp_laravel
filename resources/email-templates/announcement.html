<div style="margin:0;padding:24px;background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="600" cellpadding="0" cellspacing="0" align="center" style="width:600px;max-width:100%;margin:0 auto;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(17,24,39,0.08);">
    <tr>
      <td style="background:#4f46e5;padding:26px 40px;">
        <p style="margin:0;color:#c7d2fe;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700;">Your Company</p>
      </td>
    </tr>
    <tr>
      <td style="padding:40px;">
        <h1 style="margin:0 0 16px;color:#111827;font-size:26px;line-height:1.25;font-weight:800;">A big announcement, {{name}} &#127881;</h1>
        <p style="margin:0 0 26px;color:#4b5563;font-size:16px;line-height:1.65;">We have something exciting to share. Replace this text with the details of your announcement &mdash; a new product, a milestone, or an important update your audience will care about.</p>
        <table role="presentation" cellpadding="0" cellspacing="0">
          <tr><td style="border-radius:10px;background:#4f46e5;">
            <a href="https://example.com" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;border-radius:10px;">Read the announcement</a>
          </td></tr>
        </table>
        <p style="margin:30px 0 0;color:#6b7280;font-size:15px;line-height:1.6;">Warm regards,<br><strong style="color:#374151;">The Team</strong></p>
      </td>
    </tr>
  </table>
</div>
